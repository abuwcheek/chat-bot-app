<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - AI ChatBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">

{% if messages %}
<div class="flash-wrapper">
    {% for message in messages %}
    <div class="flash-message {{ message.tags }}">
        <span>{{ message }}</span>
        <button type="button" class="flash-close" aria-label="Yopish">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}

<div class="auth-card text-center">
    <h3>Ro'yxatdan o'tish</h3>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3 text-start">
                <label class="form-label">Ism</label>
                <input type="text" name="first_name" class="form-control" placeholder="Ismingiz" required>
            </div>
            <div class="col-md-6 mb-3 text-start">
                <label class="form-label">Familiya</label>
                <input type="text" name="last_name" class="form-control" placeholder="Familiyangiz" required>
            </div>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3 text-start">
            <label class="form-label">Parol</label>
            <input type="password" name="password" class="form-control" placeholder="Parol yarating" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Parolni tasdiqlang</label>
            <input type="password" name="password_confirm" class="form-control" placeholder="Parolni qayta kiriting" required>
        </div>
        
        <button type="submit" class="btn-auth btn-register">Ro'yxatdan o'tish</button>
    </form>

    <div class="auth-footer">
        Akkountingiz bormi? <a href="{% url 'login' %}" class="text-success">Kirish</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const flashWrapper = document.querySelector('.flash-wrapper');
        if (!flashWrapper) return;

        flashWrapper.querySelectorAll('.flash-close').forEach(btn => {
            btn.addEventListener('click', function() {
                this.closest('.flash-message')?.remove();
            });
        });

        setTimeout(() => {
            flashWrapper.classList.add('flash-hidden');
        }, 4500);
    });
</script>
</body>
</html>
