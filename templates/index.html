<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container-fluid h-100">
    <div class="row h-100">
        <nav class="col-md-3 col-lg-2 sidebar d-flex flex-column" id="sidebar">
            <div class="sidebar-header pt-3 px-2">
            </div>

            <div id="chat-history-list" class="list-group list-group-flush flex-grow-1 overflow-auto mt-3 px-2">
                </div>

            <div class="sidebar-footer p-3">
                <hr class="text-secondary">
                
                <button class="btn w-100" id="signin-text" style="background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; transition: all 0.2s ease; padding: 0.5rem 0;">
                    Saytga kirish
                </button>
                <style>
                    #signin-text:hover {
                        background-color: rgba(255,255,255,0.1) !important;
                        border-color: rgba(255,255,255,0.5) !important;
                    }
                </style>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 d-flex flex-column px-0" id="chat-main">
            <div class="top-header d-flex justify-content-between align-items-center p-3">
                <div class="chat-model-name fw-bold text-secondary"></div>
                {% if user.is_authenticated %}
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" id="new-chat-btn">
                    <i class="fas fa-plus me-1"></i> Yangi chat
                </button>
                {% endif %}
            </div>

            <div id="chat-container" class="flex-grow-1 overflow-auto">
                <div id="welcome-screen" class="text-center d-flex flex-column justify-content-center align-items-center h-100">
                    {% if not user.is_authenticated %}
                    <h2 class="text-white fw-bold mb-4">Assalomu aleykum, Chatbot ga xush kelibsiz!</h2>
                    <div class="d-grid gap-3" style="max-width: 300px;">
                        <button class="btn btn-lg btn-google w-100 d-flex align-items-center justify-content-center">
                            <i class="fab fa-google me-2"></i>
                            Google bilan kirish
                        </button>
                        <button class="btn btn-lg btn-signup w-100">Ro'yxatdan o'tish</button>
                    </div>
                    {% else %}
                    <h2 class="text-white fw-bold">Qanday yordam bera olaman?</h2>
                    {% endif %}
                </div>
                <div id="messages-list" class="mx-auto" style="max-width: 800px;"></div>
            </div>

            <div class="chat-input-area pb-4 px-3" {% if not user.is_authenticated %}style="display: none;"{% endif %}>
                <div class="input-wrapper mx-auto">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control shadow-none" placeholder="ChatGPT-ga savol bering...">
                        <button class="btn btn-send-action" id="send-btn">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <p class="text-center text-secondary mt-2 x-small">AI xato qilishi mumkin. Ma'lumotlarni tekshiring.</p>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
